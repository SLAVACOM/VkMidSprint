services:
  tarantool:
    image: tarantool/tarantool
    container_name: tarantool
    ports:
      - "3301:3301"
    volumes:
      - ./tarantool:/opt/tarantool
    command: >
      tarantool /opt/tarantool/init.lua
    restart: unless-stopped

  vk-mid-sprint:
    image: vk-mid-sprint:latest
    build:
      context: .
      args:
        DOCKER_BUILDKIT: 1
    restart: on-failure
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      - tarantool
    environment:
        - TARANTOOL_HOST=tarantool
        - TARANTOOL_PORT=3301


